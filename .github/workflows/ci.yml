name: Deploy site

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Prepare landing page
        run: |
          mkdir -p website/dist
          cp website/index.html website/dist/index.html

      - name: Publish to website branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan website
          git reset --hard
          cp -r website/dist/* .
          touch .nojekyll
          git add --all
          git commit -m "Deploy site: $GITHUB_SHA" || true
          git push --force origin website
